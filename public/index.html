
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crossword Player</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #17324d;
      --muted: #5b7188;
      --line: #d9e3ee;
      --primary: #0b6bcb;
      --primary-dark: #0857a6;
      --active: #b9dbff;
      --word: #e7f2ff;
      --cross: #fff2b8;
      --good: #dff5e6;
      --bad: #fde8e8;
      --shadow: 0 12px 28px rgba(23, 50, 77, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      background: linear-gradient(135deg, #0b6bcb, #0d84b8);
      color: white;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      opacity: 0.96;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 18px;
    }

    .panel-header {
      padding: 18px 18px 10px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 21px;
    }

    .panel-body {
      padding: 18px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid #c9d7e6;
      border-radius: 12px;
      font-size: 15px;
      background: white;
      color: var(--text);
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #edf4fb;
      color: var(--text);
      border: 1px solid #d8e5f3;
    }

    .status {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fbfdff;
      font-size: 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .board-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fbfdff;
    }

    .crossword-grid {
      display: grid;
      gap: 2px;
      width: max-content;
      background: #cdd9e8;
      padding: 2px;
      border-radius: 8px;
    }

    .cell {
      position: relative;
      background: white;
      border: 0;
      outline: none;
      font-weight: 700;
      color: #1c3550;
      text-transform: uppercase;
      text-align: center;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      user-select: none;
      -webkit-appearance: none;
      appearance: none;
      border-radius: 0;
    }

    input.cell {
      cursor: text;
    }

    .cell.black {
      background: #20364f;
      cursor: default;
    }

    .cell.active {
      background: var(--active) !important;
    }

    .cell.word {
      background: var(--word);
    }

    .cell.crossword-cross {
      background: var(--cross);
    }

    .cell.correct {
      background: var(--good) !important;
    }

    .cell.incorrect {
      background: var(--bad) !important;
    }

    .cell-number {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 10px;
      font-weight: 700;
      color: #516a85;
      line-height: 1;
      pointer-events: none;
      z-index: 2;
    }

    .clue-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .clue-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fbfdff;
    }

    .clue-box h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .clue-list {
      margin: 0;
      padding-left: 20px;
    }

    .clue-list li {
      margin-bottom: 10px;
      line-height: 1.35;
      cursor: pointer;
    }

    .clue-list li.active-clue {
      background: #e7f2ff;
      border-radius: 8px;
      padding: 6px 8px;
    }

    .current-clue {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fbfdff;
      font-size: 15px;
      max-height: 240px;
      overflow: auto;
    }

    @media (max-width: 980px) {
      .grid,
      .clue-columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Crossword Player</h1>
      <p>Loads <strong>/crossword.json</strong> from your public website folder.</p>
    </section>

    <div class="grid">
      <aside>
        <section class="panel">
          <div class="panel-header"><h2>Puzzle Controls</h2></div>
          <div class="panel-body">
            <div class="stack">
              <div>
                <label for="boardSize">Board Size</label>
                <select id="boardSize">
                  <option value="25" selected>25 x 25</option>
                  <option value="50">50 x 50</option>
                  <option value="75">75 x 75</option>
                </select>
              </div>

              <div>
                <label for="wordCount">Word Count</label>
                <select id="wordCount">
                  <option value="12">12</option>
                  <option value="25" selected>25</option>
                  <option value="35">35</option>
                  <option value="50">50</option>
                </select>
              </div>

              <button id="loadPuzzleBtn" class="btn btn-primary">Load crossword.json</button>
              <button id="toggleDirectionBtn" class="btn btn-secondary">Toggle Direction</button>
              <button id="checkBtn" class="btn btn-secondary">Check Answers</button>
              <button id="clearMarksBtn" class="btn btn-secondary">Clear Check Marks</button>
              <button id="revealBtn" class="btn btn-secondary">Reveal Puzzle</button>
              <div id="status" class="status">Waiting to load /crossword.json</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header"><h2>Current Clue</h2></div>
          <div class="panel-body">
            <div id="currentClue" class="currentClue current-clue">No clue selected.</div>
          </div>
        </section>
      </aside>

      <main>
        <section class="panel">
          <div class="panel-header"><h2>Crossword Board</h2></div>
          <div class="panel-body">
            <div class="board-wrap">
              <div id="crosswordGrid" class="crossword-grid"></div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header"><h2>Clues</h2></div>
          <div class="panel-body">
            <div class="clue-columns">
              <div class="clue-box">
                <h3>Across</h3>
                <ol id="acrossClues" class="clue-list"></ol>
              </div>
              <div class="clue-box">
                <h3>Down</h3>
                <ol id="downClues" class="clue-list"></ol>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const state = {
      puzzle: null,
      selected: null,
      direction: "across",
      userGrid: []
    };

    function $(id) {
      return document.getElementById(id);
    }

    function setStatus(text, isError = false) {
      const el = $("status");
      el.textContent = text;
      el.style.color = isError ? "#a12626" : "";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getRequestedWordLimit() {
      return parseInt($("wordCount").value, 10) || 25;
    }

    function getRequestedBoardSize() {
      return parseInt($("boardSize").value, 10) || 25;
    }

    function getCellSize(size) {
      if (size >= 75) return 12;
      if (size >= 50) return 18;
      if (size >= 25) return 28;
      return 38;
    }

    function buildCellsForWord(word) {
      const cells = [];
      const dir = word.direction || word.dir;
      for (let i = 0; i < word.answer.length; i++) {
        cells.push({
          row: word.row + (dir === "down" ? i : 0),
          col: word.col + (dir === "across" ? i : 0)
        });
      }
      return cells;
    }

    function normalizePuzzle(data) {
      if (!data || !Array.isArray(data.words)) {
        throw new Error("crossword.json must contain words[]");
      }

      const maxWords = getRequestedWordLimit();

      const words = data.words
        .slice(0, maxWords)
        .map(w => ({
          answer: String(w.answer || "").toUpperCase(),
          clue: String(w.clue || ""),
          row: Number(w.row),
          col: Number(w.col),
          direction: String(w.direction || "").toLowerCase(),
          number: Number(w.number)
        }))
        .filter(w =>
          w.answer &&
          (w.direction === "across" || w.direction === "down") &&
          Number.isFinite(w.row) &&
          Number.isFinite(w.col)
        );

      if (!words.length) {
        throw new Error("No valid words found in crossword.json");
      }

      let minRow = Infinity;
      let minCol = Infinity;
      let maxRow = -Infinity;
      let maxCol = -Infinity;

      for (const word of words) {
        for (const cell of buildCellsForWord(word)) {
          minRow = Math.min(minRow, cell.row);
          minCol = Math.min(minCol, cell.col);
          maxRow = Math.max(maxRow, cell.row);
          maxCol = Math.max(maxCol, cell.col);
        }
      }

      const rawRows = maxRow - minRow + 1;
      const rawCols = maxCol - minCol + 1;
      const requestedBoard = getRequestedBoardSize();
      const rows = Math.max(rawRows, requestedBoard);
      const cols = Math.max(rawCols, requestedBoard);

      const rowOffset = Math.floor((rows - rawRows) / 2);
      const colOffset = Math.floor((cols - rawCols) / 2);

      const grid = Array.from({ length: rows }, () => Array.from({ length: cols }, () => null));

      const placements = words.map(word => ({
        ...word,
        row: (word.row - minRow) + rowOffset,
        col: (word.col - minCol) + colOffset,
        dir: word.direction,
        displayNumber: word.number
      }));

      for (const word of placements) {
        const cells = buildCellsForWord(word);
        for (let i = 0; i < cells.length; i++) {
          grid[cells[i].row][cells[i].col] = word.answer[i];
        }
      }

      return {
        title: data.title || "Crossword",
        grid,
        placements,
        across: placements.filter(p => p.dir === "across").sort((a, b) => a.number - b.number),
        down: placements.filter(p => p.dir === "down").sort((a, b) => a.number - b.number)
      };
    }

    function buildUserGrid(grid) {
      return grid.map(row => row.map(cell => (cell === null ? null : "")));
    }

    function getWordsAtCell(row, col) {
      return state.puzzle.placements.filter(p =>
        buildCellsForWord(p).some(c => c.row === row && c.col === col)
      );
    }

    function getCellsForWord(word) {
      return buildCellsForWord(word);
    }

    function renderClues() {
      $("acrossClues").innerHTML = state.puzzle.across.map(c =>
        `<li data-dir="across" data-number="${c.number}"><strong>${c.number}.</strong> ${escapeHtml(c.clue)} <span class="muted">(${c.answer.length})</span></li>`
      ).join("");

      $("downClues").innerHTML = state.puzzle.down.map(c =>
        `<li data-dir="down" data-number="${c.number}"><strong>${c.number}.</strong> ${escapeHtml(c.clue)} <span class="muted">(${c.answer.length})</span></li>`
      ).join("");

      document.querySelectorAll(".clue-list li").forEach(li => {
        li.addEventListener("click", () => {
          const dir = li.dataset.dir;
          const number = Number(li.dataset.number);
          const word = state.puzzle.placements.find(p => p.dir === dir && p.number === number);
          if (!word) return;
          state.direction = dir;
          selectCell(word.row, word.col, true);
        });
      });
    }

    function attachCellEvents(input, r, c) {
      input.addEventListener("focus", () => {
        selectCell(r, c, false);
      });

      input.addEventListener("click", () => {
        selectCell(r, c, false);
      });

      input.addEventListener("input", (e) => {
        const letter = (e.target.value || "").toUpperCase().replace(/[^A-Z]/g, "");
        e.target.value = letter;
        state.userGrid[r][c] = letter;

        if (letter) {
          moveNext();
        } else {
          updateHighlighting();
        }
      });

      input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !e.target.value) {
          e.preventDefault();
          movePrev();
          return;
        }

        if (e.key === "ArrowRight") {
          e.preventDefault();
          moveToCell(r, c + 1);
          return;
        }

        if (e.key === "ArrowLeft") {
          e.preventDefault();
          moveToCell(r, c - 1);
          return;
        }

        if (e.key === "ArrowUp") {
          e.preventDefault();
          moveToCell(r - 1, c);
          return;
        }

        if (e.key === "ArrowDown") {
          e.preventDefault();
          moveToCell(r + 1, c);
          return;
        }
      });
    }

    function rebuildGrid() {
      const gridEl = $("crosswordGrid");
      const rows = state.puzzle.grid.length;
      const cols = rows ? state.puzzle.grid[0].length : 0;
      const cellSize = getCellSize(Math.max(rows, cols));

      gridEl.innerHTML = "";
      gridEl.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;

      const startMap = new Map();
      for (const p of state.puzzle.placements) {
        startMap.set(`${p.row},${p.col}`, p.displayNumber);
      }

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const answer = state.puzzle.grid[r][c];

          if (answer === null) {
            const black = document.createElement("div");
            black.className = "cell black";
            black.style.width = `${cellSize}px`;
            black.style.height = `${cellSize}px`;
            gridEl.appendChild(black);
            continue;
          }

          const input = document.createElement("input");
          input.type = "text";
          input.inputMode = "text";
          input.enterKeyHint = "next";
          input.maxLength = 1;
          input.className = "cell";
          input.dataset.row = r;
          input.dataset.col = c;
          input.style.width = `${cellSize}px`;
          input.style.height = `${cellSize}px`;
          input.style.fontSize = cellSize <= 12 ? "9px" : cellSize <= 18 ? "12px" : cellSize <= 28 ? "16px" : "20px";
          input.autocomplete = "off";
          input.autocapitalize = "characters";
          input.spellcheck = false;
          input.value = state.userGrid[r][c] || "";

          const num = startMap.get(`${r},${c}`);
          if (num) {
            const wrapper = document.createElement("div");
            wrapper.style.position = "relative";
            wrapper.style.width = `${cellSize}px`;
            wrapper.style.height = `${cellSize}px`;

            const n = document.createElement("div");
            n.className = "cell-number";
            n.textContent = num;
            wrapper.appendChild(n);

            input.style.position = "absolute";
            input.style.left = "0";
            input.style.top = "0";
            wrapper.appendChild(input);

            attachCellEvents(input, r, c);
            gridEl.appendChild(wrapper);
          } else {
            attachCellEvents(input, r, c);
            gridEl.appendChild(input);
          }
        }
      }
    }

    function updateHighlighting() {
      if (!state.selected) {
        $("currentClue").textContent = "No clue selected.";
        return;
      }

      document.querySelectorAll("#crosswordGrid .cell").forEach(cell => {
        cell.classList.remove("word", "active", "crossword-cross");
      });

      const activeWord = state.selected.word;
      const activeCells = new Set(getCellsForWord(activeWord).map(c => `${c.row},${c.col}`));

      document.querySelectorAll("#crosswordGrid .cell").forEach(cell => {
        const row = cell.dataset.row;
        const col = cell.dataset.col;
        if (row == null || col == null) return;

        const key = `${row},${col}`;
        if (activeCells.has(key)) cell.classList.add("word");
        if (Number(row) === state.selected.row && Number(col) === state.selected.col) {
          cell.classList.add("active");
        }

        const wordsHere = getWordsAtCell(Number(row), Number(col));
        if (wordsHere.length > 1) cell.classList.add("crossword-cross");
      });

      document.querySelectorAll(".clue-list li").forEach(li => li.classList.remove("active-clue"));
      const activeLi = document.querySelector(`.clue-list li[data-dir="${activeWord.dir}"][data-number="${activeWord.number}"]`);
      if (activeLi) activeLi.classList.add("active-clue");

      $("currentClue").textContent =
        `${activeWord.dir.toUpperCase()} ${activeWord.number}: ${activeWord.clue} (${activeWord.answer.length})`;
    }

    function selectCell(row, col, focusInput = true) {
      const words = getWordsAtCell(row, col);
      if (!words.length) return;

      const match = words.find(w => w.dir === state.direction) || words[0];
      state.direction = match.dir;
      state.selected = { row, col, word: match };
      updateHighlighting();

      if (focusInput) {
        const input = document.querySelector(`#crosswordGrid input[data-row="${row}"][data-col="${col}"]`);
        if (input && document.activeElement !== input) {
          input.focus();
        }
      }
    }

    function moveToCell(row, col) {
      if (
        row < 0 || col < 0 ||
        row >= state.puzzle.grid.length ||
        col >= state.puzzle.grid[0].length ||
        state.puzzle.grid[row][col] === null
      ) return;
      selectCell(row, col, true);
    }

    function moveNext() {
      const cells = getCellsForWord(state.selected.word);
      const idx = cells.findIndex(c => c.row === state.selected.row && c.col === state.selected.col);
      if (idx >= 0 && idx < cells.length - 1) {
        selectCell(cells[idx + 1].row, cells[idx + 1].col, true);
      } else {
        updateHighlighting();
      }
    }

    function movePrev() {
      const cells = getCellsForWord(state.selected.word);
      const idx = cells.findIndex(c => c.row === state.selected.row && c.col === state.selected.col);
      if (idx > 0) {
        selectCell(cells[idx - 1].row, cells[idx - 1].col, true);
      } else {
        updateHighlighting();
      }
    }

    function writeLetter(letter) {
      state.userGrid[state.selected.row][state.selected.col] = letter;
      moveNext();
      updateHighlighting();
    }

    function backspaceLetter() {
      const row = state.selected.row;
      const col = state.selected.col;

      if (state.userGrid[row][col]) {
        state.userGrid[row][col] = "";
      } else {
        movePrev();
        state.userGrid[state.selected.row][state.selected.col] = "";
      }
      updateHighlighting();
    }

    function toggleDirection() {
      state.direction = state.direction === "across" ? "down" : "across";
      if (state.selected) {
        const words = getWordsAtCell(state.selected.row, state.selected.col);
        const nextWord = words.find(w => w.dir === state.direction);
        if (nextWord) state.selected.word = nextWord;
      }
      updateHighlighting();
      setStatus(`Direction: ${state.direction}`);
    }

    function checkAnswers() {
      document.querySelectorAll("#crosswordGrid .cell").forEach(cell => {
        cell.classList.remove("correct", "incorrect");
        const row = cell.dataset.row;
        const col = cell.dataset.col;
        if (row == null || col == null) return;

        const r = Number(row);
        const c = Number(col);
        const actual = state.userGrid[r][c] || "";
        const expected = state.puzzle.grid[r][c];
        if (!actual) return;

        if (actual === expected) cell.classList.add("correct");
        else cell.classList.add("incorrect");
      });

      setStatus("Checked answers.");
    }

    function clearMarks() {
      document.querySelectorAll("#crosswordGrid .cell").forEach(cell => {
        cell.classList.remove("correct", "incorrect");
      });
      setStatus("Check marks cleared.");
    }

    function revealPuzzle() {
      for (let r = 0; r < state.puzzle.grid.length; r++) {
        for (let c = 0; c < state.puzzle.grid[0].length; c++) {
          if (state.puzzle.grid[r][c] !== null) {
            state.userGrid[r][c] = state.puzzle.grid[r][c];
          }
        }
      }

      const active = document.activeElement;
      const activeRow = active?.dataset?.row;
      const activeCol = active?.dataset?.col;

      rebuildGrid();
      updateHighlighting();

      if (activeRow != null && activeCol != null) {
        const input = document.querySelector(`#crosswordGrid input[data-row="${activeRow}"][data-col="${activeCol}"]`);
        if (input) input.focus();
      }

      setStatus("Puzzle revealed.");
    }

    async function loadPuzzle() {
      try {
        setStatus("Loading /crossword.json ...");
        const res = await fetch("/crossword.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        state.puzzle = normalizePuzzle(data);
        state.userGrid = buildUserGrid(state.puzzle.grid);

        renderClues();
        rebuildGrid();

        if (state.puzzle.placements.length) {
          const first = state.puzzle.placements[0];
          state.direction = first.dir;
          selectCell(first.row, first.col, true);
        }

        setStatus(`Puzzle loaded. Board: ${getRequestedBoardSize()} x ${getRequestedBoardSize()} | Words: up to ${getRequestedWordLimit()}`);
      } catch (err) {
        setStatus(`Failed to load puzzle: ${err.message}`, true);
      }
    }

    document.addEventListener("keydown", (e) => {
      if (!state.selected) return;

      if (/^[a-zA-Z]$/.test(e.key)) {
        e.preventDefault();
        writeLetter(e.key.toUpperCase());
        return;
      }

      if (e.key === "Backspace") {
        e.preventDefault();
        backspaceLetter();
        return;
      }

      if (e.key === " ") {
        e.preventDefault();
        toggleDirection();
        return;
      }

      if (e.key === "ArrowRight") {
        e.preventDefault();
        moveToCell(state.selected.row, state.selected.col + 1);
      }
      if (e.key === "ArrowLeft") {
        e.preventDefault();
        moveToCell(state.selected.row, state.selected.col - 1);
      }
      if (e.key === "ArrowUp") {
        e.preventDefault();
        moveToCell(state.selected.row - 1, state.selected.col);
      }
      if (e.key === "ArrowDown") {
        e.preventDefault();
        moveToCell(state.selected.row + 1, state.selected.col);
      }
    });

    $("loadPuzzleBtn").addEventListener("click", loadPuzzle);
    $("toggleDirectionBtn").addEventListener("click", toggleDirection);
    $("checkBtn").addEventListener("click", checkAnswers);
    $("clearMarksBtn").addEventListener("click", clearMarks);
    $("revealBtn").addEventListener("click", revealPuzzle);
  </script>
</body>
</html>
