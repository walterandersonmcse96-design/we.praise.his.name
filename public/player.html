<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crossword Player</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #17324d;
      --muted: #5b7188;
      --line: #d9e3ee;
      --primary: #0b6bcb;
      --primary-dark: #0857a6;
      --accent: #dfeeff;
      --active: #b9dbff;
      --cross: #fff2b8;
      --good: #dff5e6;
      --bad: #fde8e8;
      --shadow: 0 12px 28px rgba(23, 50, 77, 0.08);
      --cell: 42px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .hero {
      background: linear-gradient(135deg, #0b6bcb, #0d84b8);
      color: white;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      opacity: 0.96;
    }

    .grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 18px;
    }

    .panel-header {
      padding: 18px 18px 10px;
      border-bottom: 1px solid var(--line);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 21px;
    }

    .panel-body {
      padding: 18px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #edf4fb;
      color: var(--text);
      border: 1px solid #d8e5f3;
    }

    .status {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fbfdff;
      font-size: 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .board-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fbfdff;
    }

    .crossword-grid {
      display: grid;
      gap: 2px;
      width: max-content;
      background: #cdd9e8;
      padding: 2px;
      border-radius: 8px;
    }

    .cell {
      position: relative;
      width: var(--cell);
      height: var(--cell);
      background: white;
      border: 0;
      outline: none;
      font-weight: 700;
      font-size: 20px;
      color: #1c3550;
      text-transform: uppercase;
      text-align: center;
      padding: 0;
      cursor: pointer;
    }

    .cell.black {
      background: #20364f;
      cursor: default;
    }

    .cell.active {
      background: var(--active);
    }

    .cell.word {
      background: var(--accent);
    }

    .cell.crossword-cross {
      background: var(--cross);
    }

    .cell.correct {
      background: var(--good);
    }

    .cell.incorrect {
      background: var(--bad);
    }

    .cell-number {
      position: absolute;
      top: 2px;
      left: 3px;
      font-size: 10px;
      font-weight: 700;
      color: #516a85;
      line-height: 1;
      pointer-events: none;
    }

    .clue-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .clue-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fbfdff;
    }

    .clue-box h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .clue-list {
      margin: 0;
      padding-left: 20px;
    }

    .clue-list li {
      margin-bottom: 10px;
      line-height: 1.35;
      cursor: pointer;
    }

    .clue-list li.active-clue {
      background: #e7f2ff;
      border-radius: 8px;
      padding: 6px 8px;
    }

    .current-clue {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fbfdff;
      font-size: 15px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @media (max-width: 980px) {
      .grid,
      .clue-columns,
      .row2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Crossword Player</h1>
      <p>Play the crossword, check answers, and reveal the puzzle when needed.</p>
    </section>

    <div class="grid">
      <aside>
        <section class="panel">
          <div class="panel-header"><h2>Puzzle Controls</h2></div>
          <div class="panel-body">
            <div class="stack">
              <button id="loadPuzzleBtn" class="btn btn-primary">Load crossword.json</button>
              <button id="toggleDirectionBtn" class="btn btn-secondary">Toggle Direction</button>
              <button id="checkBtn" class="btn btn-secondary">Check Answers</button>
              <button id="clearMarksBtn" class="btn btn-secondary">Clear Check Marks</button>
              <button id="revealBtn" class="btn btn-secondary">Reveal Puzzle</button>
              <div id="status" class="status">Waiting to load puzzle.</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header"><h2>Current Clue</h2></div>
          <div class="panel-body">
            <div id="currentClue" class="current-clue">No clue selected.</div>
          </div>
        </section>
      </aside>

      <main>
        <section class="panel">
          <div class="panel-header"><h2>Crossword Board</h2></div>
          <div class="panel-body">
            <div class="board-wrap">
              <div id="crosswordGrid" class="crossword-grid"></div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header"><h2>Clues</h2></div>
          <div class="panel-body">
            <div class="clue-columns">
              <div class="clue-box">
                <h3>Across</h3>
                <ol id="acrossClues" class="clue-list"></ol>
              </div>
              <div class="clue-box">
                <h3>Down</h3>
                <ol id="downClues" class="clue-list"></ol>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const state = {
      puzzle: null,
      selected: null,
      direction: "across",
      userGrid: []
    };

    function $(id) {
      return document.getElementById(id);
    }

    function setStatus(text, isError = false) {
      const el = $("status");
      el.textContent = text;
      el.style.color = isError ? "#a12626" : "";
    }

    function createPuzzleFromJson(data) {
      const words = [];

      for (const item of (data.across || [])) {
        words.push({
          number: item.number,
          clue: item.clue,
          answer: item.answer.toUpperCase(),
          dir: "across"
        });
      }

      for (const item of (data.down || [])) {
        words.push({
          number: item.number,
          clue: item.clue,
          answer: item.answer.toUpperCase(),
          dir: "down"
        });
      }

      words.sort((a, b) => a.answer.length < b.answer.length ? 1 : -1);

      const size = 20;
      const grid = Array.from({ length: size }, () => Array.from({ length: size }, () => null));
      const placements = [];

      function inBounds(r, c) {
        return r >= 0 && c >= 0 && r < size && c < size;
      }

      function canPlace(word, row, col, dir) {
        const dr = dir === "down" ? 1 : 0;
        const dc = dir === "across" ? 1 : 0;

        for (let i = 0; i < word.length; i++) {
          const r = row + dr * i;
          const c = col + dc * i;
          if (!inBounds(r, c)) return false;
          const v = grid[r][c];
          if (v !== null && v !== word[i]) return false;
        }

        return true;
      }

      function place(entry, row, col) {
        const dr = entry.dir === "down" ? 1 : 0;
        const dc = entry.dir === "across" ? 1 : 0;

        for (let i = 0; i < entry.answer.length; i++) {
          const r = row + dr * i;
          const c = col + dc * i;
          grid[r][c] = entry.answer[i];
        }

        placements.push({
          ...entry,
          row,
          col
        });
      }

      if (words.length) {
        const first = words[0];
        const row = Math.floor(size / 2);
        const col = Math.max(0, Math.floor((size - first.answer.length) / 2));
        place(first, row, col);
      }

      for (let wi = 1; wi < words.length; wi++) {
        const word = words[wi];
        let placed = false;

        for (const p of placements) {
          for (let i = 0; i < p.answer.length; i++) {
            for (let j = 0; j < word.answer.length; j++) {
              if (p.answer[i] !== word.answer[j]) continue;

              let row, col;
              if (p.dir === "across" && word.dir === "down") {
                row = p.row - j;
                col = p.col + i;
              } else if (p.dir === "down" && word.dir === "across") {
                row = p.row + i;
                col = p.col - j;
              } else {
                continue;
              }

              if (canPlace(word.answer, row, col, word.dir)) {
                place(word, row, col);
                placed = true;
                break;
              }
            }
            if (placed) break;
          }
          if (placed) break;
        }

        if (!placed) {
          outer:
          for (let r = 0; r < size; r++) {
            for (let c = 0; c < size; c++) {
              if (canPlace(word.answer, r, c, word.dir)) {
                place(word, r, c);
                break outer;
              }
            }
          }
        }
      }

      let minR = size, minC = size, maxR = 0, maxC = 0;
      for (const p of placements) {
        const dr = p.dir === "down" ? 1 : 0;
        const dc = p.dir === "across" ? 1 : 0;
        for (let i = 0; i < p.answer.length; i++) {
          minR = Math.min(minR, p.row + dr * i);
          minC = Math.min(minC, p.col + dc * i);
          maxR = Math.max(maxR, p.row + dr * i);
          maxC = Math.max(maxC, p.col + dc * i);
        }
      }

      const trimmed = [];
      for (let r = minR; r <= maxR; r++) {
        const row = [];
        for (let c = minC; c <= maxC; c++) {
          row.push(grid[r][c]);
        }
        trimmed.push(row);
      }

      const trimmedPlacements = placements.map(p => ({
        ...p,
        row: p.row - minR,
        col: p.col - minC
      }));

      return {
        grid: trimmed,
        placements: trimmedPlacements,
        across: trimmedPlacements.filter(p => p.dir === "across"),
        down: trimmedPlacements.filter(p => p.dir === "down")
      };
    }

    function buildUserGrid(grid) {
      return grid.map(row => row.map(cell => (cell === null ? null : "")));
    }

    function renderPuzzle() {
      if (!state.puzzle) return;

      const gridEl = $("crosswordGrid");
      const rows = state.puzzle.grid.length;
      const cols = rows ? state.puzzle.grid[0].length : 0;
      gridEl.innerHTML = "";
      gridEl.style.gridTemplateColumns = `repeat(${cols}, 42px)`;

      const numberMap = new Map();
      const sorted = [...state.puzzle.placements].sort((a, b) => {
        if (a.row !== b.row) return a.row - b.row;
        return a.col - b.col;
      });

      let num = 1;
      for (const p of sorted) {
        const key = `${p.row},${p.col}`;
        if (!numberMap.has(key)) numberMap.set(key, num++);
        p.displayNumber = numberMap.get(key);
      }

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const answerCell = state.puzzle.grid[r][c];
          const input = document.createElement("input");
          input.className = "cell";
          input.maxLength = 1;
          input.dataset.row = r;
          input.dataset.col = c;

          if (answerCell === null) {
            input.classList.add("black");
            input.disabled = true;
          } else {
            input.value = state.userGrid[r][c] || "";
            const numHere = sorted.find(p => p.row === r && p.col === c)?.displayNumber;
            if (numHere) {
              const n = document.createElement("div");
              n.className = "cell-number";
              n.textContent = numHere;
              const wrapper = document.createElement("div");
              wrapper.className = "cell";
              wrapper.dataset.row = r;
              wrapper.dataset.col = c;
              wrapper.tabIndex = 0;
              wrapper.appendChild(n);

              const value = document.createElement("div");
              value.textContent = input.value;
              value.style.fontWeight = "700";
              value.style.fontSize = "20px";
              value.style.textTransform = "uppercase";
              value.className = "cell-value";
              wrapper.appendChild(value);

              wrapper.addEventListener("click", () => selectCell(r, c));
              gridEl.appendChild(wrapper);
              continue;
            }

            input.addEventListener("click", () => selectCell(r, c));
            input.addEventListener("input", onCellInput);
            input.addEventListener("keydown", onCellKeyDown);
          }

          if (!input.disabled) {
            input.addEventListener("click", () => selectCell(r, c));
            input.addEventListener("input", onCellInput);
            input.addEventListener("keydown", onCellKeyDown);
          }

          gridEl.appendChild(input);
        }
      }

      // rebuild as buttons/inputs consistently
      rebuildPlayableGrid();
      renderClues();
      highlightSelection();
    }

    function rebuildPlayableGrid() {
      const gridEl = $("crosswordGrid");
      const rows = state.puzzle.grid.length;
      const cols = state.puzzle.grid[0].length;
      gridEl.innerHTML = "";
      gridEl.style.gridTemplateColumns = `repeat(${cols}, 42px)`;

      const numberMap = new Map();
      const sorted = [...state.puzzle.placements].sort((a, b) => {
        if (a.row !== b.row) return a.row - b.row;
        return a.col - b.col;
      });

      let num = 1;
      for (const p of sorted) {
        const key = `${p.row},${p.col}`;
        if (!numberMap.has(key)) numberMap.set(key, num++);
        p.displayNumber = numberMap.get(key);
      }

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const answerCell = state.puzzle.grid[r][c];

          if (answerCell === null) {
            const black = document.createElement("div");
            black.className = "cell black";
            gridEl.appendChild(black);
            continue;
          }

          const btn = document.createElement("button");
          btn.className = "cell";
          btn.type = "button";
          btn.dataset.row = r;
          btn.dataset.col = c;
          btn.textContent = state.userGrid[r][c] || "";

          const numHere = numberMap.get(`${r},${c}`);
          if (numHere) {
            const n = document.createElement("div");
            n.className = "cell-number";
            n.textContent = numHere;
            btn.appendChild(n);
            const span = document.createElement("span");
            span.textContent = state.userGrid[r][c] || "";
            btn.dataset.hasNumber = "1";
            btn.appendChild(span);
          }

          btn.addEventListener("click", () => selectCell(r, c));
          gridEl.appendChild(btn);
        }
      }
    }

    function getWordsAtCell(row, col) {
      return state.puzzle.placements.filter(p => {
        for (let i = 0; i < p.answer.length; i++) {
          const r = p.row + (p.dir === "down" ? i : 0);
          const c = p.col + (p.dir === "across" ? i : 0);
          if (r === row && c === col) return true;
        }
        return false;
      });
    }

    function selectCell(row, col) {
      const words = getWordsAtCell(row, col);
      if (!words.length) return;

      let chosen = words.find(w => w.dir === state.direction) || words[0];
      state.direction = chosen.dir;
      state.selected = { row, col, word: chosen };
      highlightSelection();
      focusBoard();
    }

    function focusBoard() {
      window.addEventListener("keydown", boardTypingHandler, { once: false });
    }

    function boardTypingHandler(e) {
      if (!state.selected) return;

      if (/^[a-zA-Z]$/.test(e.key)) {
        e.preventDefault();
        writeLetter(e.key.toUpperCase());
        return;
      }

      if (e.key === "Backspace") {
        e.preventDefault();
        backspaceLetter();
        return;
      }

      if (e.key === "ArrowRight" || e.key === "ArrowLeft" || e.key === "ArrowUp" || e.key === "ArrowDown") {
        e.preventDefault();
        moveSelectionByArrow(e.key);
        return;
      }

      if (e.key === " ") {
        e.preventDefault();
        toggleDirection();
      }
    }

    function writeLetter(letter) {
      const { row, col } = state.selected;
      state.userGrid[row][col] = letter;
      moveNext();
      rebuildPlayableGrid();
      highlightSelection();
    }

    function backspaceLetter() {
      const { row, col } = state.selected;
      if (state.userGrid[row][col]) {
        state.userGrid[row][col] = "";
      } else {
        movePrev();
        const pos = state.selected;
        state.userGrid[pos.row][pos.col] = "";
      }
      rebuildPlayableGrid();
      highlightSelection();
    }

    function moveSelectionByArrow(key) {
      let { row, col } = state.selected;
      if (key === "ArrowRight") col++;
      if (key === "ArrowLeft") col--;
      if (key === "ArrowUp") row--;
      if (key === "ArrowDown") row++;

      if (
        row < 0 || col < 0 ||
        row >= state.puzzle.grid.length ||
        col >= state.puzzle.grid[0].length ||
        state.puzzle.grid[row][col] === null
      ) return;

      selectCell(row, col);
    }

    function moveNext() {
      if (!state.selected) return;
      const { word } = state.selected;
      const cells = getCellsForWord(word);
      const idx = cells.findIndex(c => c.row === state.selected.row && c.col === state.selected.col);
      if (idx >= 0 && idx < cells.length - 1) {
        selectCell(cells[idx + 1].row, cells[idx + 1].col);
      }
    }

    function movePrev() {
      if (!state.selected) return;
      const { word } = state.selected;
      const cells = getCellsForWord(word);
      const idx = cells.findIndex(c => c.row === state.selected.row && c.col === state.selected.col);
      if (idx > 0) {
        selectCell(cells[idx - 1].row, cells[idx - 1].col);
      }
    }

    function getCellsForWord(word) {
      const out = [];
      for (let i = 0; i < word.answer.length; i++) {
        out.push({
          row: word.row + (word.dir === "down" ? i : 0),
          col: word.col + (word.dir === "across" ? i : 0)
        });
      }
      return out;
    }

    function highlightSelection() {
      rebuildPlayableGrid();

      if (!state.selected) {
        $("currentClue").textContent = "No clue selected.";
        return;
      }

      const activeWord = state.selected.word;
      const activeCells = getCellsForWord(activeWord);
      const activeSet = new Set(activeCells.map(c => `${c.row},${c.col}`));

      const gridEl = $("crosswordGrid");
      [...gridEl.children].forEach(cell => {
        const row = cell.dataset.row;
        const col = cell.dataset.col;
        if (row == null || col == null) return;

        const key = `${row},${col}`;
        if (activeSet.has(key)) cell.classList.add("word");
        if (Number(row) === state.selected.row && Number(col) === state.selected.col) {
          cell.classList.add("active");
        }

        const wordsHere = getWordsAtCell(Number(row), Number(col));
        if (wordsHere.length > 1) cell.classList.add("crossword-cross");
      });

      document.querySelectorAll(".clue-list li").forEach(li => li.classList.remove("active-clue"));
      const li = document.querySelector(`[data-dir="${activeWord.dir}"][data-number="${activeWord.number}"]`);
      if (li) li.classList.add("active-clue");

      $("currentClue").textContent =
        `${activeWord.dir.toUpperCase()} ${activeWord.number}: ${activeWord.clue} (${activeWord.answer.length})`;
    }

    function renderClues() {
      $("acrossClues").innerHTML = state.puzzle.across.map(c =>
        `<li data-dir="across" data-number="${c.number}"><strong>${c.number}.</strong> ${escapeHtml(c.clue)} <span class="muted">(${c.answer.length})</span></li>`
      ).join("");

      $("downClues").innerHTML = state.puzzle.down.map(c =>
        `<li data-dir="down" data-number="${c.number}"><strong>${c.number}.</strong> ${escapeHtml(c.clue)} <span class="muted">(${c.answer.length})</span></li>`
      ).join("");

      document.querySelectorAll(".clue-list li").forEach(li => {
        li.addEventListener("click", () => {
          const dir = li.dataset.dir;
          const number = Number(li.dataset.number);
          const word = state.puzzle.placements.find(p => p.dir === dir && p.number === number);
          if (!word) return;
          state.direction = dir;
          selectCell(word.row, word.col);
        });
      });
    }

    function checkAnswers() {
      const gridEl = $("crosswordGrid");
      [...gridEl.children].forEach(cell => {
        cell.classList.remove("correct", "incorrect");
        const row = cell.dataset.row;
        const col = cell.dataset.col;
        if (row == null || col == null) return;

        const r = Number(row);
        const c = Number(col);
        const expected = state.puzzle.grid[r][c];
        const actual = state.userGrid[r][c] || "";

        if (!actual) return;
        if (actual === expected) cell.classList.add("correct");
        else cell.classList.add("incorrect");
      });

      setStatus("Checked answers.");
    }

    function clearMarks() {
      document.querySelectorAll(".cell").forEach(cell => {
        cell.classList.remove("correct", "incorrect");
      });
      setStatus("Check marks cleared.");
    }

    function revealPuzzle() {
      for (let r = 0; r < state.puzzle.grid.length; r++) {
        for (let c = 0; c < state.puzzle.grid[0].length; c++) {
          if (state.puzzle.grid[r][c] !== null) {
            state.userGrid[r][c] = state.puzzle.grid[r][c];
          }
        }
      }
      rebuildPlayableGrid();
      highlightSelection();
      setStatus("Puzzle revealed.");
    }

    function toggleDirection() {
      state.direction = state.direction === "across" ? "down" : "across";
      if (state.selected) {
        const words = getWordsAtCell(state.selected.row, state.selected.col);
        const match = words.find(w => w.dir === state.direction);
        if (match) state.selected.word = match;
      }
      highlightSelection();
      setStatus(`Direction: ${state.direction}`);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function loadPuzzle() {
      try {
        setStatus("Loading crossword.json...");
        const res = await fetch("/crossword.json", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        state.puzzle = createPuzzleFromJson(data);
        state.userGrid = buildUserGrid(state.puzzle.grid);

        renderPuzzle();

        if (state.puzzle.placements.length) {
          const first = state.puzzle.placements[0];
          state.direction = first.dir;
          selectCell(first.row, first.col);
        }

        setStatus("Puzzle loaded.");
      } catch (err) {
        setStatus(`Failed to load puzzle: ${err.message}`, true);
      }
    }

    $("loadPuzzleBtn").addEventListener("click", loadPuzzle);
    $("toggleDirectionBtn").addEventListener("click", toggleDirection);
    $("checkBtn").addEventListener("click", checkAnswers);
    $("clearMarksBtn").addEventListener("click", clearMarks);
    $("revealBtn").addEventListener("click", revealPuzzle);
  </script>
</body>
</html>
